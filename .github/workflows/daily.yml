name: Daily overdue notification

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  daily:
    runs-on: ubuntu-latest
    steps:
      - name: Send daily overdue notification
        run: |
          curl -sf -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://planirovshikdel.vercel.app/api/daily
